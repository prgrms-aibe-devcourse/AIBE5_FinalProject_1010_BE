# EC2-A 전용 — Caddy 리버스 프록시(단일 도메인 HTTPS 종단).
#  - 백엔드 경로 → ALB, 루트 → 프론트 정적(./www → /srv/www)
#  - host 네트워크로 80/443을 직접 바인딩하고 ALB DNS로 아웃바운드한다.
services:
  caddy:
    image: caddy:2
    container_name: studyflow-caddy
    restart: unless-stopped
    network_mode: host
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
      ALB_DNS: ${ALB_DNS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./www:/srv/www
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
