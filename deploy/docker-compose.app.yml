# 각 EC2(A·B) 공통 — 앱 컨테이너만 실행. 상태는 RDS/ElastiCache/S3(컨테이너 밖) 공유.
# 프로필 prod(Dockerfile에서 -Dspring.profiles.active=prod) → application-prod.yml이 .env 환경변수를 읽음.
services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: studyflow-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
