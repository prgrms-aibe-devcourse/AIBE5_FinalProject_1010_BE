<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">StudyFlow backend technology stack overview</title>
  <desc id="desc">Animated overview of the StudyFlow Spring Boot backend stack.</desc>
  <style>
    .title { font: 800 34px Arial, sans-serif; fill: #172033; }
    .sub { font: 500 15px Arial, sans-serif; fill: #667085; }
    .card-title { font: 800 18px Arial, sans-serif; fill: #172033; }
    .card-copy { font: 600 13px Arial, sans-serif; fill: #475467; }
    .pill { font: 700 12px Arial, sans-serif; fill: #344054; }
    .flow { stroke-dasharray: 10 10; animation: dash 1.7s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -40; } }
    @keyframes pulse { 0%,100% { opacity: .72; transform: scale(.98); } 50% { opacity: 1; transform: scale(1.02); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  </style>

  <rect width="1200" height="680" fill="#f7f9fc"/>
  <rect x="36" y="28" width="1128" height="624" rx="8" fill="#ffffff" stroke="#d8dee9"/>

  <text x="70" y="82" class="title">StudyFlow Backend Stack</text>
  <text x="70" y="110" class="sub">Java 21 + Spring Boot 3.5.14 / Multi-instance AWS architecture</text>

  <path d="M600 314 C470 260 386 237 286 225" fill="none" stroke="#f59e0b" stroke-width="3" class="flow"/>
  <path d="M600 314 C730 260 814 237 914 225" fill="none" stroke="#2563eb" stroke-width="3" class="flow"/>
  <path d="M600 356 C470 416 390 445 286 463" fill="none" stroke="#16a34a" stroke-width="3" class="flow"/>
  <path d="M600 356 C730 416 810 445 914 463" fill="none" stroke="#db2777" stroke-width="3" class="flow"/>

  <g class="pulse">
    <rect x="442" y="232" width="316" height="188" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <circle cx="600" cy="288" r="30" fill="#22c55e"/>
    <path d="M584 287h32M600 271v32" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <text x="600" y="344" text-anchor="middle" class="card-title">Spring Boot 3.5.14</text>
    <text x="600" y="369" text-anchor="middle" class="card-copy">MVC / WebFlux / Security / JPA</text>
    <rect x="496" y="386" width="84" height="24" rx="8" fill="#dcfce7"/>
    <text x="538" y="403" text-anchor="middle" class="pill">Java 21</text>
    <rect x="590" y="386" width="108" height="24" rx="8" fill="#dcfce7"/>
    <text x="644" y="403" text-anchor="middle" class="pill">Gradle</text>
  </g>

  <g class="float">
    <rect x="82" y="148" width="310" height="164" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
    <rect x="106" y="174" width="48" height="48" rx="8" fill="#f59e0b"/>
    <path d="M118 198h24M130 186v24" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="170" y="192" class="card-title">Core Platform</text>
    <text x="170" y="215" class="card-copy">Spring MVC / Reactor / Validation</text>
    <text x="106" y="255" class="pill">Hibernate</text>
    <text x="200" y="255" class="pill">QueryDSL</text>
    <text x="294" y="255" class="pill">OpenAPI</text>
    <text x="106" y="280" class="pill">Lombok</text>
    <text x="200" y="280" class="pill">Spring Mail</text>
  </g>

  <g class="float" style="animation-delay:.25s">
    <rect x="808" y="148" width="310" height="164" rx="8" fill="#eff6ff" stroke="#2563eb"/>
    <rect x="832" y="174" width="48" height="48" rx="8" fill="#2563eb"/>
    <path d="M844 188h24v20h-24zM850 182v6M862 182v6" fill="none" stroke="#fff" stroke-width="4"/>
    <text x="896" y="192" class="card-title">Data &amp; Security</text>
    <text x="896" y="215" class="card-copy">Persistence, cache and authentication</text>
    <text x="832" y="255" class="pill">MySQL</text>
    <text x="916" y="255" class="pill">Redis</text>
    <text x="990" y="255" class="pill">AWS S3</text>
    <text x="832" y="280" class="pill">JWT</text>
    <text x="916" y="280" class="pill">OAuth2</text>
    <text x="1000" y="280" class="pill">BCrypt</text>
  </g>

  <g class="float" style="animation-delay:.5s">
    <rect x="82" y="398" width="310" height="164" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
    <rect x="106" y="424" width="48" height="48" rx="8" fill="#16a34a"/>
    <path d="M116 448h28M120 438l8 10-8 10M140 438l-8 10 8 10" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="170" y="442" class="card-title">Realtime &amp; Media</text>
    <text x="170" y="465" class="card-copy">Classroom messaging and WebRTC</text>
    <text x="106" y="505" class="pill">WebSocket</text>
    <text x="200" y="505" class="pill">STOMP</text>
    <text x="278" y="505" class="pill">SockJS</text>
    <text x="106" y="530" class="pill">LiveKit</text>
    <text x="200" y="530" class="pill">Redis Pub/Sub</text>
  </g>

  <g class="float" style="animation-delay:.75s">
    <rect x="808" y="398" width="310" height="164" rx="8" fill="#fdf2f8" stroke="#db2777"/>
    <rect x="832" y="424" width="48" height="48" rx="8" fill="#db2777"/>
    <path d="M856 435l4 9 10 1-8 7 2 10-8-5-8 5 2-10-8-7 10-1z" fill="#fff"/>
    <text x="896" y="442" class="card-title">AI &amp; Operations</text>
    <text x="896" y="465" class="card-copy">OpenAI services and AWS deployment</text>
    <text x="832" y="505" class="pill">Spring AI</text>
    <text x="928" y="505" class="pill">OpenAI</text>
    <text x="1008" y="505" class="pill">SSE</text>
    <text x="832" y="530" class="pill">Docker</text>
    <text x="920" y="530" class="pill">AWS</text>
    <text x="988" y="530" class="pill">GitHub Actions</text>
  </g>

  <g fill="#172033">
    <circle r="6">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M600 314 C470 260 386 237 286 225"/>
    </circle>
    <circle r="6">
      <animateMotion dur="2.8s" repeatCount="indefinite" path="M600 314 C730 260 814 237 914 225"/>
    </circle>
    <circle r="6">
      <animateMotion dur="2.6s" repeatCount="indefinite" path="M600 356 C470 416 390 445 286 463"/>
    </circle>
    <circle r="6">
      <animateMotion dur="3s" repeatCount="indefinite" path="M600 356 C730 416 810 445 914 463"/>
    </circle>
  </g>

  <text x="600" y="618" text-anchor="middle" class="sub">REST + SSE + STOMP + LiveKit / RDS + ElastiCache + S3</text>
</svg>
