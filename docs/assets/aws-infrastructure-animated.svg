<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">StudyFlow AWS deployment and runtime architecture</title>
  <desc id="desc">Animated request, data and deployment flows across DuckDNS, Caddy, ALB, EC2, RDS, ElastiCache, S3, LiveKit, OpenAI and GitHub Actions.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#db2777"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
  </defs>
  <style>
    .title{font:800 34px Arial,sans-serif;fill:#172033}
    .subtitle{font:500 15px Arial,sans-serif;fill:#667085}
    .section{font:800 13px Arial,sans-serif;letter-spacing:1.2px;fill:#475467}
    .node-title{font:800 17px Arial,sans-serif;fill:#172033}
    .node-copy{font:600 12px Arial,sans-serif;fill:#667085}
    .tiny{font:700 11px Arial,sans-serif;fill:#475467}
    .runtime{fill:none;stroke:#2563eb;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#arrow-blue);animation:dash 1.25s linear infinite}
    .data{fill:none;stroke:#16a34a;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#arrow-green);animation:dash 1.65s linear infinite}
    .deploy{fill:none;stroke:#7c3aed;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#arrow-purple);animation:dash 1.4s linear infinite}
    .external{fill:none;stroke:#db2777;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#arrow-pink);animation:dash 1.8s linear infinite}
    .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}
    .float{animation:float 3.4s ease-in-out infinite}
    @keyframes dash{to{stroke-dashoffset:-38}}
    @keyframes pulse{0%,100%{opacity:.82}50%{opacity:1}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  </style>

  <rect width="1400" height="900" fill="#f5f8fc"/>
  <rect x="28" y="24" width="1344" height="850" rx="10" fill="#fff" stroke="#d8dee9"/>
  <text x="64" y="76" class="title">StudyFlow AWS Deployment &amp; Runtime</text>
  <text x="64" y="105" class="subtitle">Seoul region · EC2 horizontal scaling · shared state outside application containers</text>

  <text x="64" y="150" class="section">USER REQUEST FLOW</text>
  <rect x="55" y="168" width="180" height="96" rx="8" fill="#eff6ff" stroke="#60a5fa" filter="url(#shadow)"/>
  <text x="145" y="207" text-anchor="middle" class="node-title">Browser</text>
  <text x="145" y="232" text-anchor="middle" class="node-copy">React · HTTPS · WSS</text>

  <rect x="285" y="168" width="180" height="96" rx="8" fill="#f5f3ff" stroke="#a78bfa" filter="url(#shadow)"/>
  <text x="375" y="207" text-anchor="middle" class="node-title">DuckDNS</text>
  <text x="375" y="232" text-anchor="middle" class="node-copy">Frontend / API domains</text>

  <g class="pulse">
    <rect x="515" y="148" width="240" height="136" rx="8" fill="#ecfdf3" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
    <text x="635" y="188" text-anchor="middle" class="node-title">EIP + Caddy</text>
    <text x="635" y="213" text-anchor="middle" class="node-copy">EC2-A edge gateway</text>
    <text x="635" y="236" text-anchor="middle" class="node-copy">TLS termination · Host routing</text>
    <text x="635" y="259" text-anchor="middle" class="tiny">Let's Encrypt HTTPS</text>
  </g>

  <rect x="535" y="330" width="200" height="92" rx="8" fill="#f0fdfa" stroke="#2dd4bf"/>
  <text x="635" y="367" text-anchor="middle" class="node-title">React Dist</text>
  <text x="635" y="392" text-anchor="middle" class="node-copy">Caddy static files</text>

  <g class="pulse">
    <rect x="815" y="168" width="200" height="96" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="915" y="207" text-anchor="middle" class="node-title">AWS ALB</text>
    <text x="915" y="232" text-anchor="middle" class="node-copy">Health check · Load balance</text>
  </g>

  <rect x="1065" y="130" width="270" height="318" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="1090" y="162" class="section">SPRING BOOT APP LAYER</text>

  <g class="float">
    <rect x="1090" y="184" width="220" height="100" rx="8" fill="#eef2ff" stroke="#6366f1" filter="url(#shadow)"/>
    <text x="1200" y="222" text-anchor="middle" class="node-title">EC2-A</text>
    <text x="1200" y="247" text-anchor="middle" class="node-copy">Docker · Spring Boot :8080</text>
    <text x="1200" y="268" text-anchor="middle" class="tiny">App + frontend edge</text>
  </g>

  <g class="float" style="animation-delay:.55s">
    <rect x="1090" y="315" width="220" height="100" rx="8" fill="#eef2ff" stroke="#6366f1" filter="url(#shadow)"/>
    <text x="1200" y="353" text-anchor="middle" class="node-title">EC2-B</text>
    <text x="1200" y="378" text-anchor="middle" class="node-copy">Docker · Spring Boot :8080</text>
    <text x="1200" y="399" text-anchor="middle" class="tiny">App replica</text>
  </g>

  <path d="M235 216H285" class="runtime"/>
  <path d="M465 216H515" class="runtime"/>
  <path d="M755 216H815" class="runtime"/>
  <path d="M1015 216H1090" class="runtime"/>
  <path d="M1015 228C1040 228 1040 365 1090 365" class="runtime"/>
  <path d="M635 284V330" class="runtime"/>
  <text x="258" y="203" class="tiny">HTTPS</text>
  <text x="472" y="203" class="tiny">A record</text>
  <text x="764" y="203" class="tiny">API / WS</text>
  <text x="646" y="310" class="tiny">Frontend host</text>

  <text x="64" y="493" class="section">SHARED STATEFUL LAYER</text>
  <rect x="280" y="515" width="210" height="108" rx="8" fill="#fff1f2" stroke="#fb7185" filter="url(#shadow)"/>
  <text x="385" y="555" text-anchor="middle" class="node-title">Amazon RDS</text>
  <text x="385" y="580" text-anchor="middle" class="node-copy">MySQL · persistent data</text>
  <text x="385" y="602" text-anchor="middle" class="tiny">Member · Course · Payment</text>

  <g class="pulse">
    <rect x="555" y="515" width="230" height="108" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
    <text x="670" y="555" text-anchor="middle" class="node-title">ElastiCache</text>
    <text x="670" y="580" text-anchor="middle" class="node-copy">Redis shared state</text>
    <text x="670" y="602" text-anchor="middle" class="tiny">Pub/Sub · lock · snapshot</text>
  </g>

  <rect x="850" y="515" width="210" height="108" rx="8" fill="#f0fdf4" stroke="#4ade80" filter="url(#shadow)"/>
  <text x="955" y="555" text-anchor="middle" class="node-title">Amazon S3</text>
  <text x="955" y="580" text-anchor="middle" class="node-copy">Shared uploaded files</text>
  <text x="955" y="602" text-anchor="middle" class="tiny">Image · PDF · Audio</text>

  <path d="M1150 415C1120 470 470 460 420 515" class="data"/>
  <path d="M1200 415C1180 480 700 460 670 515" class="data"/>
  <path d="M1250 415C1240 470 1000 475 955 515" class="data"/>
  <path d="M1280 415C1290 500 790 495 750 540" class="data" opacity=".55"/>

  <text x="1095" y="480" class="section">EXTERNAL SERVICES</text>
  <rect x="1090" y="515" width="95" height="108" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="1138" y="553" text-anchor="middle" class="node-title">LiveKit</text>
  <text x="1138" y="578" text-anchor="middle" class="node-copy">SFU</text>
  <text x="1138" y="600" text-anchor="middle" class="tiny">Media</text>

  <rect x="1195" y="515" width="95" height="108" rx="8" fill="#fdf2f8" stroke="#f472b6"/>
  <text x="1243" y="553" text-anchor="middle" class="node-title">OpenAI</text>
  <text x="1243" y="578" text-anchor="middle" class="node-copy">GPT-4o</text>
  <text x="1243" y="600" text-anchor="middle" class="tiny">AI / SSE</text>

  <rect x="1300" y="515" width="65" height="108" rx="8" fill="#f5f3ff" stroke="#a78bfa"/>
  <text x="1333" y="553" text-anchor="middle" class="node-title">Toss</text>
  <text x="1333" y="578" text-anchor="middle" class="node-copy">Pay</text>
  <text x="1333" y="600" text-anchor="middle" class="tiny">API</text>

  <path d="M1230 415C1230 470 1138 470 1138 515" class="external"/>
  <path d="M1260 415C1260 475 1243 475 1243 515" class="external"/>
  <path d="M1290 415C1290 475 1333 475 1333 515" class="external"/>

  <text x="64" y="688" class="section">CI/CD DEPLOYMENT FLOW</text>
  <rect x="55" y="710" width="190" height="100" rx="8" fill="#f8fafc" stroke="#64748b" filter="url(#shadow)"/>
  <text x="150" y="750" text-anchor="middle" class="node-title">GitHub</text>
  <text x="150" y="775" text-anchor="middle" class="node-copy">main branch merge</text>

  <rect x="320" y="710" width="210" height="100" rx="8" fill="#f5f3ff" stroke="#8b5cf6" filter="url(#shadow)"/>
  <text x="425" y="750" text-anchor="middle" class="node-title">GitHub Actions</text>
  <text x="425" y="775" text-anchor="middle" class="node-copy">Test · Build · Deploy</text>

  <rect x="610" y="710" width="190" height="100" rx="8" fill="#fdf2f8" stroke="#ec4899" filter="url(#shadow)"/>
  <text x="705" y="750" text-anchor="middle" class="node-title">GHCR</text>
  <text x="705" y="775" text-anchor="middle" class="node-copy">Docker image</text>

  <rect x="910" y="690" width="380" height="140" rx="8" fill="#eef2ff" stroke="#6366f1" filter="url(#shadow)"/>
  <text x="1100" y="731" text-anchor="middle" class="node-title">Rolling deployment</text>
  <text x="1100" y="758" text-anchor="middle" class="node-copy">EC2-A and EC2-B pull the same image</text>
  <text x="1100" y="783" text-anchor="middle" class="node-copy">ALB health check removes unhealthy targets</text>
  <text x="1100" y="807" text-anchor="middle" class="tiny">Secrets → runtime environment variables</text>

  <path d="M245 760H320" class="deploy"/>
  <path d="M530 760H610" class="deploy"/>
  <path d="M800 760H910" class="deploy"/>
  <path d="M1100 690C1110 650 1160 600 1175 415" class="deploy"/>

  <g fill="#2563eb">
    <circle r="6"><animateMotion dur="2.2s" repeatCount="indefinite" path="M235 216H285"/></circle>
    <circle r="6"><animateMotion begin=".4s" dur="2.4s" repeatCount="indefinite" path="M465 216H515"/></circle>
    <circle r="6"><animateMotion begin=".8s" dur="2.4s" repeatCount="indefinite" path="M755 216H815"/></circle>
    <circle r="6"><animateMotion begin="1.1s" dur="2.2s" repeatCount="indefinite" path="M1015 216H1090"/></circle>
  </g>
  <g fill="#16a34a">
    <circle r="6"><animateMotion dur="2.8s" repeatCount="indefinite" path="M1150 415C1120 470 470 460 420 515"/></circle>
    <circle r="6"><animateMotion begin=".6s" dur="2.7s" repeatCount="indefinite" path="M1200 415C1180 480 700 460 670 515"/></circle>
    <circle r="6"><animateMotion begin="1.1s" dur="2.6s" repeatCount="indefinite" path="M1250 415C1240 470 1000 475 955 515"/></circle>
  </g>
  <g fill="#7c3aed">
    <circle r="6"><animateMotion dur="2.2s" repeatCount="indefinite" path="M245 760H320"/></circle>
    <circle r="6"><animateMotion begin=".45s" dur="2.2s" repeatCount="indefinite" path="M530 760H610"/></circle>
    <circle r="6"><animateMotion begin=".9s" dur="2.2s" repeatCount="indefinite" path="M800 760H910"/></circle>
  </g>

  <rect x="55" y="842" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="75" y="853" class="tiny">Runtime traffic</text>
  <rect x="190" y="842" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="210" y="853" class="tiny">Shared data</text>
  <rect x="310" y="842" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="330" y="853" class="tiny">Deployment</text>
  <rect x="420" y="842" width="12" height="12" rx="2" fill="#db2777"/>
  <text x="440" y="853" class="tiny">External API</text>
  <text x="1335" y="853" text-anchor="end" class="subtitle">State outside EC2 enables horizontal scaling</text>
</svg>
