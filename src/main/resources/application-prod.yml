# =====================================================================
# 운영(prod) 프로필 설정 — Docker Compose(EC2)에서 사용
# - 모든 시크릿은 환경변수(${...})로 주입된다. 이 파일에 비밀값 직접 기입 금지!
# - 환경변수 목록은 루트의 .env.prod.example 참고 (EC2의 .env 파일에서 채움)
# - application.yml(로컬 전용)은 gitignore라 CI 빌드 jar에 포함되지 않으므로,
#   이 파일은 prod 기동에 필요한 모든 설정을 자체 포함(self-contained)한다.
# =====================================================================
spring:
  application:
    name: studyflow
  datasource:
    # localhost가 아닌 compose 서비스명(mysql)로 접근
    url: jdbc:mysql://mysql:3306/studyflow?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update   # TODO: 스키마 안정화 후 validate로 전환
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  data:
    redis:
      host: redis-server   # compose 서비스명
      port: 6379
      password: ${REDIS_PASSWORD}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      chat:
        options:
          model: gpt-4o-mini
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${BACKEND_URL}/login/oauth2/code/kakao
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            redirect-uri: ${BACKEND_URL}/login/oauth2/code/google
            scope:
              - profile
              - email
            client-name: Google
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            redirect-uri: ${BACKEND_URL}/login/oauth2/code/naver
            scope:
              - name
              - email
              - nickname
              - profile_image
              - gender
              - birthday
              - age
              - birthyear
              - mobile
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000      # 1시간
  refresh-token-expiration: 604800000   # 7일

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:studyflow-uploads}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY:dummy}
      secret-key: ${AWS_SECRET_KEY:dummy}

livekit:
  api-key: ${LIVEKIT_API_KEY:dummy}
  api-secret: ${LIVEKIT_API_SECRET:dummy}
  url: ${LIVEKIT_URL:wss://dummy}

server:
  port: 8080
  # Caddy(리버스 프록시) 뒤에서 X-Forwarded-Proto를 신뢰해
  # OAuth redirect 등 절대 URL이 https로 생성되도록 함
  forward-headers-strategy: framework

# 운영 프론트 도메인(CloudFront). allowCredentials=true라 와일드카드 불가 — 정확히 명시
cors:
  allowed-origins: ${FRONTEND_URL}

# 소셜 로그인 성공/실패 후 돌아갈 프론트 주소
oauth2:
  frontend-url: ${FRONTEND_URL}

openai:
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini
  timeout-seconds: 60
  api-key: ${OPENAI_API_KEY:dummy}
