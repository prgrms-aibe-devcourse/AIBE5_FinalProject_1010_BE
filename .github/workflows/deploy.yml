# =====================================================================
# develop push → Docker 이미지 빌드(GHCR) → EC2에 SSH 배포
#
# 설정 관리 (repo Settings > Secrets and variables > Actions):
# - Secrets(비밀값): EC2_HOST/EC2_USER/EC2_SSH_KEY(배포용),
#   DB_PASSWORD/REDIS_PASSWORD/JWT_SECRET/OPENAI_API_KEY,
#   KAKAO·GOOGLE·NAVER_CLIENT_ID/SECRET, AWS_ACCESS_KEY/AWS_SECRET_KEY,
#   LIVEKIT_API_KEY/LIVEKIT_API_SECRET
# - Variables(공개 가능한 설정): BACKEND_DOMAIN/BACKEND_URL,
#   FRONTEND_DOMAIN/FRONTEND_CDN/FRONTEND_URL, DB_USERNAME, S3_BUCKET, LIVEKIT_URL
#
# 서버의 ~/studyflow/.env는 배포할 때마다 위 값들로 자동 생성된다.
# → 키를 바꾸려면: GitHub에서 Secret/Variable 수정 → Actions 재실행(또는 push)
# =====================================================================
name: Deploy Backend to EC2

on:
  push:
    # TODO: develop 머지 후 chore/deploy-setup은 제거
    branches: [develop, chore/deploy-setup]
  workflow_dispatch: {}   # 수동 실행 버튼 (develop에 머지된 후부터 버튼 표시됨)

env:
  # GHCR 이미지 이름은 소문자만 허용
  IMAGE: ghcr.io/prgrms-aibe-devcourse/aibe5_finalproject_1010_be

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Gradle 의존성 레이어 캐시 — 두 번째 빌드부터 크게 빨라짐
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # compose/Caddyfile 변경도 함께 배포되도록 매번 동기화
      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: /home/ec2-user/studyflow   # Amazon Linux 2023 (EC2_USER=ec2-user)

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/studyflow
            # .env를 GitHub Secrets/Variables로부터 재생성 (시크릿의 단일 출처 = GitHub)
            cat > .env << 'ENVEOF'
            DOCKER_IMAGE=${{ env.IMAGE }}:latest
            BACKEND_DOMAIN=${{ vars.BACKEND_DOMAIN }}
            BACKEND_URL=${{ vars.BACKEND_URL }}
            FRONTEND_DOMAIN=${{ vars.FRONTEND_DOMAIN }}
            FRONTEND_CDN=${{ vars.FRONTEND_CDN }}
            FRONTEND_URL=${{ vars.FRONTEND_URL }}
            DB_USERNAME=${{ vars.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            S3_BUCKET=${{ vars.S3_BUCKET }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            LIVEKIT_URL=${{ vars.LIVEKIT_URL }}
            ENVEOF
            chmod 600 .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
